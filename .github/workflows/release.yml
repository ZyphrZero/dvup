name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: Validate release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - id: version
        name: Read and validate package version
        shell: pwsh
        env:
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          $ErrorActionPreference = "Stop"
          $metadata = cargo metadata --locked --no-deps --format-version 1 | ConvertFrom-Json
          if ($LASTEXITCODE -ne 0) {
            throw "cargo metadata failed with exit code $LASTEXITCODE"
          }

          $package = $metadata.packages | Where-Object { $_.name -eq "dvup" }
          if ($null -eq $package) {
            throw "package 'dvup' was not found in Cargo metadata"
          }

          $version = $package.version
          if ($env:REF_TYPE -eq "tag" -and $env:REF_NAME -ne "v$version") {
            throw "release tag '$env:REF_NAME' does not match Cargo.toml version 'v$version'"
          }

          "version=$version" >> $env:GITHUB_OUTPUT

  build:
    name: Build ${{ matrix.target }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            binary: dvup.exe
          - runner: windows-latest
            target: aarch64-pc-windows-msvc
            archive: zip
            binary: dvup.exe
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            binary: dvup
          - runner: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            binary: dvup
          - runner: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
            binary: dvup
          - runner: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
            binary: dvup

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install Linux ARM64 cross toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends \
            gcc-aarch64-linux-gnu \
            libc6-dev-arm64-cross

      - name: Build release binary
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          AR_aarch64_unknown_linux_gnu: aarch64-linux-gnu-ar
        run: cargo build --locked --release --target "$TARGET"

      - name: Package Windows binary
        if: matrix.archive == 'zip'
        shell: pwsh
        env:
          BINARY: ${{ matrix.binary }}
          TARGET: ${{ matrix.target }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          $ErrorActionPreference = "Stop"
          $packageName = "dvup-v$env:VERSION-$env:TARGET"
          $staging = Join-Path $env:RUNNER_TEMP $packageName
          $archive = Join-Path $PWD "dist/$packageName.zip"

          New-Item -ItemType Directory -Force -Path $staging, (Join-Path $PWD "dist") | Out-Null
          Copy-Item -LiteralPath "target/$env:TARGET/release/$env:BINARY" -Destination $staging
          Copy-Item -LiteralPath "README.md", "LICENSE" -Destination $staging
          Compress-Archive -Path "$staging/*" -DestinationPath $archive

      - name: Package Unix binary
        if: matrix.archive == 'tar.gz'
        shell: bash
        env:
          BINARY: ${{ matrix.binary }}
          TARGET: ${{ matrix.target }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          package_name="dvup-v${VERSION}-${TARGET}"
          staging="$RUNNER_TEMP/$package_name"
          mkdir -p "$staging" dist
          install -m 0755 "target/$TARGET/release/$BINARY" "$staging/dvup"
          install -m 0644 README.md LICENSE "$staging/"
          tar -C "$staging" -czf "dist/$package_name.tar.gz" .

      - uses: actions/upload-artifact@v4
        with:
          name: dvup-v${{ needs.prepare.outputs.version }}-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

  release:
    name: Publish GitHub Release
    if: github.event_name == 'push' && github.ref_type == 'tag'
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: dvup-v${{ needs.prepare.outputs.version }}-*
          path: dist
          merge-multiple: true

      - name: Generate SHA-256 checksums
        shell: bash
        run: |
          cd dist
          sha256sum dvup-* > SHA256SUMS

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          gh release create "$RELEASE_TAG" dist/* \
            --verify-tag \
            --generate-notes \
            --title "$RELEASE_TAG"
