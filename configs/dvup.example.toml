# Complete built-in tool definitions embedded in the dvup binary.
# User TOML files use the concise schema in dvup.user.example.toml.

version = 1

[tools.dvup]
program = "cargo"
args = ["install", "dvup", "--locked"]
background = "always"
resource_group = "cargo-bin"

[[tools.dvup.processes]]
name = "dvup"
action = "wait"

[tools.dvup.probe]
program = "dvup"
args = ["--version"]

# These portable placeholders are replaced in memory with the official
# platform-specific installers before the built-in manifest is parsed.
[tools.bun]
program = "bun"
args = ["upgrade"]
resource_group = "bun-global"
background = "auto"

[[tools.bun.processes]]
name = "bun"
action = "wait"

[tools.bun.probe]
program = "bun"
args = ["--version"]

[tools.brew]
program = "brew"
args = ["update"]
platforms = ["macos", "linux"]
resource_group = "homebrew"
background = "auto"

[tools.brew.probe]
program = "brew"
args = ["--version"]

[tools.rustup]
program = "rustup"
args = ["update"]
background = "auto"

[[tools.rustup.processes]]
name = "cargo"
action = "wait"

[[tools.rustup.processes]]
name = "rustc"
action = "wait"

[tools.rustup.probe]
program = "rustup"
args = ["--version"]

[tools.scoop]
program = "scoop"
args = ["update"]
platforms = ["windows"]
resource_group = "scoop"
background = "auto"

[tools.scoop.probe]
program = "scoop"
args = ["--version"]

[tools.uv]
program = "uv"
args = ["self", "update"]
resource_group = "uv"
background = "auto"

[[tools.uv.processes]]
name = "uv"
action = "wait"

[tools.uv.probe]
program = "uv"
args = ["--version"]

[tools.deno]
program = "deno"
args = ["upgrade"]
resource_group = "deno"
background = "auto"

[[tools.deno.processes]]
name = "deno"
action = "wait"

[tools.deno.probe]
program = "deno"
args = ["--version"]

[tools.pixi]
program = "pixi"
args = ["self-update"]
resource_group = "pixi"
background = "auto"

[[tools.pixi.processes]]
name = "pixi"
action = "wait"

[tools.pixi.probe]
program = "pixi"
args = ["--version"]

[tools.mise]
program = "mise"
args = ["self-update"]
resource_group = "mise"
background = "auto"

[[tools.mise.processes]]
name = "mise"
action = "wait"

[tools.mise.probe]
program = "mise"
args = ["--version"]
