# Internal built-in manifest embedded in dvup. Do not copy it into user data.
# User-owned commands and GitHub repositories belong in dvup_custom.toml and
# use the strict schema documented by dvup.user.example.toml.

[tools.dvup]
program = "cargo"
args = ["install", "dvup", "--locked"]
latest = { provider = "crates_io", package = "dvup" }
update_version = ["cargo", "install", "dvup", "--version", "{version}", "--locked"]
background = "always"
resource_group = "cargo-bin"

[[tools.dvup.processes]]
name = "dvup"
action = "wait"

[tools.dvup.probe]
program = "dvup"
args = ["--version"]

# dvup substitutes the Unix installer definition for this native preset before parsing.
[tools.bun]
program = "bun"
args = ["upgrade"]
latest = { provider = "github_release", repository = "oven-sh/bun" }
resource_group = "bun-global"
background = "auto"

[[tools.bun.processes]]
name = "bun"
action = "wait"

[tools.bun.probe]
program = "bun"
args = ["--version"]

[tools.brew]
program = "brew"
args = ["update"]
latest = { provider = "github_release", repository = "Homebrew/brew" }
platforms = ["macos", "linux"]
resource_group = "homebrew"
background = "auto"

[tools.brew.probe]
program = "brew"
args = ["--version"]

[tools.rustup]
program = "rustup"
args = ["update"]
latest = { provider = "github_tag", repository = "rust-lang/rustup" }
background = "auto"

[[tools.rustup.processes]]
name = "cargo"
action = "wait"

[[tools.rustup.processes]]
name = "rustc"
action = "wait"

[tools.rustup.probe]
program = "rustup"
args = ["--version"]

[tools.scoop]
program = "scoop"
args = ["update"]
latest = { provider = "github_release", repository = "ScoopInstaller/Scoop" }
platforms = ["windows"]
resource_group = "scoop"
background = "auto"

[tools.scoop.probe]
program = "scoop"
args = ["--version"]

[tools.uv]
program = "uv"
args = ["self", "update"]
latest = { provider = "github_release", repository = "astral-sh/uv" }
update_version = ["uv", "self", "update", "{version}"]
resource_group = "uv"
background = "auto"

[[tools.uv.processes]]
name = "uv"
action = "wait"

[tools.uv.probe]
program = "uv"
args = ["--version"]

[tools.deno]
program = "deno"
args = ["upgrade"]
latest = { provider = "github_release", repository = "denoland/deno" }
update_version = ["deno", "upgrade", "--version", "{version}"]
resource_group = "deno"
background = "auto"

[[tools.deno.processes]]
name = "deno"
action = "wait"

[tools.deno.probe]
program = "deno"
args = ["--version"]

[tools.pixi]
program = "pixi"
args = ["self-update"]
latest = { provider = "github_release", repository = "prefix-dev/pixi" }
resource_group = "pixi"
background = "auto"

[[tools.pixi.processes]]
name = "pixi"
action = "wait"

[tools.pixi.probe]
program = "pixi"
args = ["--version"]

[tools.mise]
program = "mise"
args = ["self-update"]
latest = { provider = "github_release", repository = "jdx/mise" }
resource_group = "mise"
background = "auto"

[[tools.mise.processes]]
name = "mise"
action = "wait"

[tools.mise.probe]
program = "mise"
args = ["--version"]
