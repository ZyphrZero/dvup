# dvup_custom.toml: strict, concise user declarations.
# Uncomment complete entries only. Unknown fields and removed legacy formats are rejected.

# Package-manager command. probe_args defaults to ["--version"].
# The update command, official latest-version source, target-version support,
# process wait rule, retry policy, platform limits, and resource group are compiled locally.
#
# [commands.codegraph]
# type = "package"
# manager = "npm"
# package = "@colbymchenry/codegraph"
# executable = "codegraph"

# Override probe_args only when the executable does not support --version.
#
# [commands.example]
# type = "package"
# manager = "cargo"
# package = "example-cli"
# executable = "example"
# probe_args = ["version"]

# Self-updating custom command. Commands are argv arrays and are never joined through a shell.
#
# [commands.deno]
# type = "custom"
# update = ["deno", "upgrade"]
# probe = ["deno", "--version"]

# A custom command may compare against one explicit official source.
# Supported providers are npm, pypi, crates_io, github_release, and github_tag.
#
# [commands.deno]
# type = "custom"
# update = ["deno", "upgrade"]
# probe = ["deno", "--version"]
# latest = { provider = "github_release", repository = "denoland/deno" }

# GitHub Release monitor. The semantic asset selector is generated after the user
# chooses one real asset from the latest Release; every future Release must match exactly once.
# ZIP, TAR.GZ, and plain files install below dvup's user-level github-tools directory.
#
# [github.monitors.ripgrep]
# repository = "BurntSushi/ripgrep"
# asset = { product = "ripgrep", os = "macos", arch = "aarch64", format = "tar_gz" }
# install = { type = "user_directory" }

# A DMG always installs one named application to /Applications/<application>.
#
# [github.monitors.example]
# repository = "owner/example"
# asset = { product = "example", os = "macos", arch = "aarch64", format = "dmg" }
# install = { type = "macos_application", application = "Example.app" }
